<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ffffff" />
<title>7월 승무 스케줄</title>
<style>
  :root{
    --bg:#f5f4f1; --card:#fff; --ink:#1d1d1f; --muted:#8c8881; --faint:#b8b3aa; --line:#ecebe6;
    --accent:#e8623d; --accent-s:#fbe9e3;
    --day:#c2542f; --day-bg:#fcebe2;
    --night:#3f5180; --night-bg:#e8ecf4;
    --stby:#6f5e94; --stby-bg:#efeaf6;
    --off:#5a8763; --off-bg:#e8efe8;
    --mono:"SF Mono",ui-monospace,"Menlo","Roboto Mono",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR","Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.5;
    max-width:480px;margin:0 auto;padding-bottom:calc(env(safe-area-inset-bottom) + 30px);
    -webkit-font-smoothing:antialiased;letter-spacing:-.01em}
  /* header */
  header{padding:calc(env(safe-area-inset-top) + 26px) 24px 18px;display:flex;align-items:flex-end;gap:12px}
  header .month{font-size:24px;font-weight:800;letter-spacing:-.03em}
  header .month span{color:var(--faint);font-weight:700}
  header .sub{font-size:13px;color:var(--muted);font-weight:500;margin-bottom:5px;flex:1}
  header .taxitot{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:4px;white-space:nowrap}
  header .taxitot b{color:var(--ink);font-family:var(--mono);font-weight:700}
  header .hdrexp{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:1px}
  header .taxitot.gtl{margin-bottom:0}
  header .hdrexp .taxitot{margin-bottom:0}
  header .taxitot.gtl b{color:var(--accent)}
  /* legend */
  .legend{display:flex;gap:14px;padding:0 24px 12px;font-size:12px;color:var(--muted);font-weight:500}
  .legend i{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:0px}
  /* calendar */
  .cal{padding:4px 14px 6px}
  .dow{display:grid;grid-template-columns:repeat(7,1fr)}
  .dow span{text-align:center;font-size:11px;font-weight:600;color:var(--faint);padding:3px 0}
  .dow span:first-child{color:#cf7a6a}.dow span:last-child{color:#7a93c0}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cell{aspect-ratio:1/1.15;border-radius:13px;background:var(--card);padding:6px 4px 4px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;position:relative;border:1.5px solid transparent;
    transition:transform .1s ease}
  .cell:active{transform:scale(.94)}
  .cell .n{font-size:12px;font-weight:600;color:var(--faint);align-self:flex-start;line-height:1;margin-left:2px}
  .cell .c{font-family:var(--mono);font-size:11px;font-weight:700;margin-top:auto;margin-bottom:3px;letter-spacing:-.04em}
  .cell.empty{background:none;cursor:default}
  .cell.day{background:var(--day-bg)} .cell.day .c{color:var(--day)}
  .cell.night{background:var(--night-bg)} .cell.night .c{color:var(--night)}
  .cell.standby{background:var(--stby-bg)} .cell.standby .c{color:var(--stby)}
  .cell.off{background:var(--off-bg)}
.cell.edu{background:#f3ecda}
.cell.unknown{background:#f6e2e2}
.cell.pre{background:#f4f4f2;opacity:.55}
.edu2note{background:#efe7f3;border:1px solid #ddd0e6;color:#6f4f86;font-size:12px;font-weight:600;padding:8px 11px;border-radius:9px;margin-bottom:10px} .cell.off .c{color:var(--off);font-size:15px}
  .cell.past{opacity:.4}
  .cell.sel{border-color:var(--ink);opacity:1}
  .cell.today .n{color:var(--accent);font-weight:800}
  .cell .tx{position:absolute;top:5px;right:4px;font-size:9px}
  .cell .fd{position:absolute;top:5px;right:15px;font-size:9px}
  .taxi.food{margin-top:12px;padding-top:12px}
  .taxi.food .txitem.fdit{background:#eef7ef;border-color:#cfe6d2}
  .taxi.food .txadd button{background:#3f7a4a}
  /* detail */
  .detail{padding:14px 20px 0;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .card{background:var(--card);border-radius:20px;padding:20px;margin-bottom:14px}
  .c-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .c-top .date{font-size:14px;color:var(--muted);font-weight:600}
  .c-top .dia{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-top:2px}
  .c-top .dia small{font-size:13px;color:var(--muted);font-weight:600;margin-left:6px;letter-spacing:0}
  .badge{font-size:12px;font-weight:700;padding:5px 12px;border-radius:99px;white-space:nowrap}
  .badge.day{background:var(--day-bg);color:var(--day)}.badge.night{background:var(--night-bg);color:var(--night)}
  .badge.standby{background:var(--stby-bg);color:var(--stby)}.badge.off{background:var(--off-bg);color:var(--off)}
  .times{display:flex;gap:0;margin:18px 0 4px}
  .times .t{flex:1}
  .times .t .k{font-size:11px;color:var(--muted);font-weight:600}
  .times .t .v{font-size:30px;font-weight:800;font-family:var(--mono);letter-spacing:-.03em;margin-top:1px}
  .times .t.end .v{color:var(--accent)}
  .times .arw{align-self:center;color:var(--faint);font-size:18px;padding:0 6px;margin-top:14px}
  .block{margin-top:18px}
  .block .h{font-size:12px;font-weight:700;color:var(--muted);display:flex;align-items:center;gap:6px;margin-bottom:9px}
  .trip{display:flex;flex-direction:column;gap:3px}
  .trip .line{display:flex;align-items:center;gap:8px;font-size:14px}
  .trip .line .tm{font-family:var(--mono);font-weight:700;font-size:14px}
  .trip .sub{font-size:12px;color:var(--muted)}
  .tn{display:inline-flex;align-items:center;font-family:var(--mono);font-weight:700;font-size:12px;
    padding:2px 8px;border-radius:7px;letter-spacing:-.02em}
  .tn.mu{background:#e9f2ea;color:#4a7d54}.tn.ktx{background:#e9eef9;color:#3a5180}.tn.itx{background:#fdeee4;color:#c2542f}.tn.etc{background:#fbf0dd;color:#a5701a}
  .best{font-size:10px;font-weight:800;color:var(--accent);background:var(--accent-s);border-radius:6px;padding:1px 6px;margin-left:2px}
  .nextline{font-size:12.5px;color:var(--muted);margin-top:6px}
  .nextline .tn{font-size:11px;padding:1px 6px}
  .self{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--muted);background:#faf3ee;border-radius:12px;padding:11px 13px}
  .self b{color:var(--accent);font-weight:700}
  .rest{text-align:center;padding:26px 0 14px}
  .rest .e{font-size:40px}.rest .t{font-size:16px;font-weight:700;color:var(--off);margin-top:6px}
  /* collapsibles */
  details.fold{margin-top:10px;border-top:1px solid var(--line);padding-top:4px}
  details.fold>summary{list-style:none;cursor:pointer;padding:9px 2px;font-size:13px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:7px}
  details.fold>summary::-webkit-details-marker{display:none}
  details.fold>summary .cv{margin-left:auto;transition:transform .2s;color:var(--faint)}
  details.fold[open]>summary .cv{transform:rotate(90deg)}
  .tt{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:6px 2px 10px}
  .tt h4{font-size:11px;font-weight:700;color:var(--muted);margin:0 0 7px}
  .tt .r{display:flex;align-items:center;gap:6px;font-size:12px;padding:2.5px 0}
  .tt .r .tm{font-family:var(--mono);font-weight:700;min-width:38px}
  .tt .r .tn{font-size:10px;padding:0 5px}
  .tt .r.on{background:var(--accent-s);border-radius:6px;margin:0 -4px;padding:2.5px 4px}
  .swp{display:flex;flex-direction:column;gap:7px;padding:4px 2px 10px}
  .swp .s{display:flex;gap:9px;font-size:13px;align-items:flex-start}
  .swp .s .ic{margin-top:1px}
  .swp .s b{font-family:var(--mono)}
  .swp .intro{font-size:11.5px;color:var(--muted);line-height:1.5;margin-bottom:3px}
  .run{padding:4px 2px 8px}
  .run .leg{margin-bottom:12px}
  .run .leg .lh{font-size:11.5px;font-weight:700;color:var(--accent);margin-bottom:5px;display:flex;gap:6px;align-items:center}
  .run .leg .lh .ry{margin-left:auto;font-size:10px;color:var(--off);background:var(--off-bg);border-radius:5px;padding:1px 6px;font-weight:700}
  .run .sr{display:grid;grid-template-columns:1fr 44px 44px;gap:5px;font-size:11.5px;padding:2px 0;border-bottom:1px dotted var(--line)}
  .run .sr.hd{font-size:10px;color:var(--faint);font-weight:700}
  .run .sr.hd .a,.run .sr.hd .d{text-align:right}
  .run .sr .a,.run .sr .d{font-family:var(--mono);text-align:right;color:var(--muted)}
  .run .sr .d{color:var(--ink);font-weight:600}
  .run .sr.ms{color:var(--accent);font-weight:700}.run .sr.ms .d{color:var(--accent)}
  .run .sr .tag{font-size:9px;color:var(--faint);margin-left:4px}
  /* 팀장 */
  .lead{display:flex;align-items:center;gap:8px;font-size:13px;margin-top:14px;padding:11px 13px;background:#f3f5f3;border-radius:13px}
  .lead .who{font-weight:700}.lead .team{font-size:11px;color:var(--muted);font-weight:600}
  /* office */
  .office{margin-top:18px}
  .office .h{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:9px;display:flex;align-items:center;gap:6px}
  .office .m{display:flex;align-items:center;gap:8px;font-size:13.5px;padding:4px 0}
  .office .m .dd{font-family:var(--mono);font-weight:700}
  .office .m .dest{color:var(--muted);font-size:12.5px}
  .office .m .w{margin-left:auto;font-size:11px;color:var(--faint);font-family:var(--mono)}
  .office .alone{font-size:13px;color:var(--muted)}
  /* 조성 */
  .chip{font-size:10px;font-weight:800;border-radius:6px;padding:1px 7px;color:#fff;letter-spacing:-.02em}
  .consist{font-size:12.5px;color:var(--muted);line-height:1.7;margin-bottom:10px}
  .consist .row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:4px}
  .consist .row .tn{font-size:11px}
  .consist .sum{font-weight:700;color:var(--ink)}
  /* raw table */
  .run .rawtbl{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .run table{border-collapse:collapse;font-size:11px;width:100%;min-width:330px}
  .run th{font-size:9.5px;color:var(--faint);font-weight:700;text-align:right;padding:3px 6px;border-bottom:1px solid var(--line)}
  .run th:first-child{text-align:left}
  .run td{padding:3px 6px;text-align:right;font-family:var(--mono);color:var(--muted);border-bottom:1px dotted var(--line);white-space:nowrap}
  .run td:first-child{text-align:left;font-family:var(--sans);color:var(--ink);font-weight:600}
  .run td.dep{color:var(--ink);font-weight:700}
  .run tr.ms td{color:var(--accent)!important}
  .run td .u{font-size:9px;color:var(--faint);margin-left:3px}
  .run td .xm{font-size:9px;font-weight:700;color:#8a4b9c;margin-left:4px;white-space:nowrap}
  .run td .rd{color:#d63a2f;font-weight:800}
  /* 연차·병가 */
  .lvbanner{margin-top:14px;padding:11px 14px;border-radius:13px;font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .lvbanner span{font-size:11.5px;font-weight:500;opacity:.8}
  .lvbanner.ann{background:#e8efe8;color:#4a7d54}.lvbanner.sick{background:#fdeaea;color:#c25151}
  .leave{display:flex;align-items:center;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--line)}
  .leave .lvlab{font-size:13px;font-weight:600;color:var(--muted);margin-right:auto}
  .lv{border:1.5px solid var(--line);background:var(--card);border-radius:10px;padding:7px 13px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;font-family:inherit}
  .lv.on.ann{background:#e8efe8;border-color:#bcd4bf;color:#4a7d54}
  .lv.on.sick{background:#fdeaea;border-color:#f0cccc;color:#c25151}
  .cell .lvm{position:absolute;top:4px;right:4px;font-size:9px;font-weight:800;width:14px;height:14px;border-radius:5px;display:flex;align-items:center;justify-content:center;color:#fff}
  .cell .lvm.ann{background:#5a8763}.cell .lvm.sick{background:#c25151}
  .cell.lvcell{outline:2px dashed var(--faint);outline-offset:-2px}
  /* 팀장 + 만남 버튼 */
  .leadwrap{margin-top:14px}
  .leadrow{display:flex;align-items:center;gap:8px}
  .leadrow .lead{margin-top:0;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .leadrow .lead .who{font-weight:700}
  .meettoggle{flex-shrink:0;border:1px solid var(--line);background:#eef1f4;color:var(--ink);border-radius:10px;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
  .meettoggle.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .leadlist{margin-top:9px;display:flex;flex-direction:column;gap:6px}
  .leadlist .lg{display:flex;align-items:flex-start;gap:9px;padding:9px 12px;background:#f3f5f3;border-radius:11px}
  .leadlist .wh{font-size:11px;font-weight:800;padding:3px 10px;border-radius:999px;flex-shrink:0}
  .leadlist .wh.on{background:#e2f0e4;color:#2f7d40}
  .leadlist .wh.off{background:#fdeae0;color:#c2542f}
  .leadlist .wh.mid{background:#eceef0;color:#6b7280}
  .leadlist .whos{display:flex;flex-wrap:wrap;gap:5px 10px;flex:1;min-width:0;padding-top:1px}
  .leadlist .wp{font-size:13.5px;font-weight:700;color:var(--ink);white-space:nowrap}
  .leadlist .wp em{font-style:normal;font-size:9.5px;font-weight:800;margin-left:4px;padding:1px 5px;border-radius:6px;vertical-align:middle}
  .leadlist .wp em.d{background:#fdeae0;color:#c2542f}
  .leadlist .wp em.n{background:#e1e5f4;color:#3b4a8a}
  .meetpanel{margin-top:9px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:4px 12px 8px}
  .mgrp{font-size:11px;font-weight:800;color:var(--muted);padding:9px 0 3px;border-top:1px solid var(--line)}
  .mgrp:first-child{border-top:none}
  .meetpanel .mm{display:flex;align-items:center;gap:9px;font-size:13px;padding:4px 0}
  .meetpanel .mm .dd{font-family:var(--mono);font-weight:700}
  .meetpanel .mm .w{font-family:var(--mono);color:var(--muted);font-size:12px}
  .meetpanel .mm .ctx{margin-left:auto;font-size:11px;color:var(--faint)}
  .run .rnote{font-size:10.5px;color:var(--faint);padding:2px 2px 8px}
  .run .rungrp{font-size:12px;font-weight:800;color:var(--ink);padding:10px 2px 8px;margin-top:4px;border-top:2px solid var(--line)}
  .run .rungrp:first-of-type{border-top:none;margin-top:0}
  /* 교대 라인 (운행표) */
  .swline{font-size:11.5px;font-weight:600;margin-bottom:3px;display:flex;align-items:center;gap:5px}
  .swline span{margin-left:auto;font-family:var(--mono);color:var(--faint);font-weight:600}
  .swline.in{color:#4a7d54}.swline.out{color:var(--accent)}
  .swline b{font-family:var(--mono)}
  /* 다중 택시 */
  .taxi{display:block;margin-top:16px;padding-top:16px;border-top:1px solid var(--line)}
  .total{margin-top:16px;padding:14px 15px;background:linear-gradient(180deg,#fbf3ee,#f7efe9);border:1px solid #eaddd3;border-radius:14px}
  .total .ttop{display:flex;align-items:center;justify-content:space-between}
  .total .tlab{font-size:14px;font-weight:800;color:var(--ink)}
  .total .tval{font-size:19px;font-weight:800;color:var(--accent);font-family:var(--mono)}
  .total .tsub{font-size:12px;color:var(--muted);font-weight:600;margin-top:4px}
  .total .trange{color:var(--faint)}
  .total .cyc{display:flex;align-items:center;gap:9px;margin-top:11px}
  .total .cyclab{font-size:11.5px;color:var(--muted);font-weight:600}
  .total .cysel{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:9px;padding:7px 10px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer}
  .total .cysel:focus{outline:none;border-color:var(--accent)}
  .ttedit{border:1px solid var(--line);background:#fff;color:var(--accent);border-radius:8px;padding:3px 9px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:inherit;margin-left:6px}
  .ttedit.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .r.ed{display:flex;align-items:center;gap:5px}
  .r.ed .tm{flex:0 0 auto}
  .r.ed .esel{border:1px solid var(--line);border-radius:7px;background:#fff;font-size:11px;font-weight:600;padding:3px 4px;font-family:inherit;color:var(--ink)}
  .r.ed .eno{width:52px;border:1px solid var(--line);border-radius:7px;background:#fff;font-size:11px;font-family:var(--mono);padding:3px 5px;text-align:center;color:var(--ink)}
  .r.ed .esel:focus,.r.ed .eno:focus{outline:none;border-color:var(--accent)}
  .backup{max-width:440px;margin:14px auto 0;display:flex;align-items:center;gap:8px;padding:0 4px}
  .backup .bklab{font-size:12.5px;font-weight:700;color:var(--muted)}
  .backup .bkbtn{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:10px;padding:8px 12px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit}
  .backup .bkbtn:active{background:#f3ece6}
  .backup #impf{display:none}
  .mnav{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:2px}
  .mnav .marr{width:32px;height:32px;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:12px;font-size:22px;line-height:1;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;padding:0}
  .mnav .marr:active{background:#f3ece6}
  .mnav .marr:disabled{opacity:.3;cursor:default}
  .mnav .month{margin:0;min-width:92px;text-align:center}
  .cell.edu .c{color:#8a6d3b}
  .cell.unknown .c{color:#b23b3b}
  .badge.edu{background:#efe6d5;color:#8a6d3b}
  .pmz{color:var(--faint);font-weight:600;font-size:11px}
  .perf1.muted{color:var(--faint);font-style:normal}
  .reps{display:flex;align-items:center;gap:8px;margin-top:12px;padding:9px 12px;background:#f6f1ea;border:1px solid var(--line);border-radius:10px}
  .reps .rk{font-size:11.5px;color:var(--muted);font-weight:700}
  .reps .rv{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:7px;padding:3px 9px}
  .perf{max-width:440px;margin:12px auto 0;padding:11px 14px;background:linear-gradient(180deg,#f3f0ea,#efeae2);border:1px solid #e3dccf;border-radius:12px;font-size:12.5px;font-weight:600;color:var(--ink);text-align:center}
  .perf b{font-weight:800}
  .perf1{display:flex;gap:16px;margin:2px 0 4px;padding:9px 12px;background:#faf6f1;border:1px solid var(--line);border-radius:10px;font-size:12.5px;color:var(--muted);font-weight:600}
  .perf1 b{color:var(--ink);font-weight:800;font-family:var(--mono)}
  .taxi .th{font-size:13px;font-weight:600;color:var(--muted);display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .taxi .th b{color:var(--ink);font-family:var(--mono);margin-left:auto}
  .txlist{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
  .txitem{display:inline-flex;align-items:center;gap:6px;background:#fff5ee;border:1px solid #f3d6c5;border-radius:9px;
    padding:5px 6px 5px 11px;font-family:var(--mono);font-weight:700;font-size:13px;color:var(--accent)}
  .txitem button{border:none;background:none;color:var(--faint);font-size:16px;cursor:pointer;line-height:1;padding:0 2px}
  .txadd{display:flex;align-items:center;gap:6px}
  .txadd span{color:var(--muted);font-weight:700}

  if(DIA[dia]&&DIA[dia].ov) list=s.type==='standby'?list.filter(m=>toMin(m.from)<780):list.filter(m=>toMin(m.from)>=780);

function masanEvents(s){const dia=DIA[s.dia],rd=(dia&&dia.ref)||s.dia,segs=RUN[rd]||[];
  let legs=segs;
  if(dia&&dia.ov) legs=s.type==='standby'?segs.filter(g=>+(g.s[0].d||g.s[0].a).split(':')[0]<13):segs.filter(g=>+(g.s[0].d||g.s[0].a).split(':')[0]>=13);
  const ev=[];
  legs.forEach(g=>{const st=g.s;st.forEach((o,idx)=>{if(o.st==='마산'){
    if(idx===0)ev.push({k:'dep',t:toMin((o.d||o.a).slice(0,5))});
    else if(idx===st.length-1)ev.push({k:'arr',t:toMin((o.a||o.d).slice(0,5))});
  }});});
  return ev;}
// 내가 실제로 마산에 있는 구간 (출근 도착~첫출발 / 다리 사이 마산 대기 / 막도착~종료)
function masanPresence(s){const dia=DIA[s.dia];if(!dia)return[];const D=s.d,B=D*1440,ev=masanEvents(s),out=[];
  const inTime=dia.go?toMin(dia.go.arr):toMin(dia.cm);
  const deps=ev.filter(e=>e.k==='dep').map(e=>e.t), arrs=ev.filter(e=>e.k==='arr').map(e=>e.t);
  const sorted=ev.slice().sort((a,b)=>a.t-b.t), waits=[];
  for(let i=0;i<sorted.length-1;i++) if(sorted[i].k==='arr'&&sorted[i+1].k==='dep'&&sorted[i+1].t-sorted[i].t>5) waits.push([sorted[i].t,sorted[i+1].t]);
  if(s.type==='night'){const fd=deps.length?Math.min(...deps):toMin(dia.cm)+45;out.push({from:B+inTime,to:B+fd,kind:'출근'});
    waits.forEach(w=>out.push({from:B+w[0],to:B+w[1],kind:'휴식'}));}
  else if(s.type==='standby'){waits.forEach(w=>out.push({from:B+w[0],to:B+w[1],kind:'퇴근'}));
    const la=arrs.length?Math.max(...arrs):toMin(dia.arr);out.push({from:B+la,to:B+toMin(dia.tg),kind:'퇴근'});}
  else{const fd=deps.length?Math.min(...deps):toMin(dia.cm)+30,la=arrs.length?Math.max(...arrs):toMin(dia.tg)-30;
    out.push({from:B+inTime,to:B+fd,kind:'출근'});
    waits.forEach(w=>out.push({from:B+w[0],to:B+w[1],kind:'휴식'}));
    out.push({from:B+la,to:B+toMin(dia.tg),kind:'퇴근'});}
  return out;}
function masanLeads(s){const D=s.d,pres=masanPresence(s);if(!pres.length)return[];const map={};
  for(const x of [D-1,D,D+1]){
    const shifts=[[dayLead(x),'주간',x*1440+540,x*1440+1120,'09:00~18:40'],
                  [nightLead(x),'야간',x*1440+1090,(x+1)*1440+550,x<D?'전날 18:10~09:10':'18:10~익일 09:10']];
    for(const sh of shifts){const[code,shift,ls,le,range]=sh;
      for(const p of pres){if(Math.max(p.from,ls)<Math.min(p.to,le)){const k=code+shift+ls;
        if(!map[k])map[k]={code,shift,range,ord:ls,when:new Set()};map[k].when.add(p.kind);}}}

/* ===== 휴게·출무 타임라인 (다이아 정리 이식) ===== */

const tlDur=m=>{const h=Math.floor(m/60),mm=m%60;return (h?h+'시간 ':'')+mm+'분';};
function tlLegs(dia){const rd=(DIA[dia]&&DIA[dia].ref)||dia;const segs=RUN[rd];if(!segs)return null;

function buildTL(dia){

    const arr=abs(toMin((lg.hwan&&T_HW[lg.t])?T_HW[lg.t].arr:lg.arr));lg._arr=arr;

function tlSplit(ev){let idx=ev.length;for(let i=0;i<ev.length;i++){if(ev[i].k==='e'&&ev[i].t>=1440){idx=i;break;}}return {day0:ev.slice(0,idx),day1:ev.slice(idx)};}
const TL_C={출무:'c-chu',재출무:'c-chu',음주측정:'c-alc',기상:'c-wak',승강홈:'c-pla',출발:'c-run',종착:'c-arr',종착순회:'c-ins',숙소도착:'c-lod',숙소출발:'c-lod',종료:'c-end'};

/* 카드용: 핵심 시각 칩 + 상세 타임라인 fold */
const TL_RGB={run:'#3f5180',rest:'#5a8763',chk:'#c2542f',sleep:'#6f5e94'};
const TL_EMO={run:'🚆',rest:'☕',chk:'📋',sleep:'🛏️'};
const tlDur2=m=>{const h=Math.floor(m/60),mm=m%60;return (h?h+'시간 ':'')+(mm?mm+'분':(h?'':'0분'));};
function tlSegsFrom(ev){
  const out=[];

    if(j>=ev.length)break;
    const a=ev[i],b=ev[j];if(b.t-a.t<=0)continue;

function tlIsToday(){const rn=new Date();return rn.getFullYear()===yr()&&(rn.getMonth()+1)===curMonth&&rn.getDate()===curDay;}

function tlStateHtml(segs,nowAdj,today){

function tlViewGantt(segs,nowAdj,today){

  return (`<div class="tlsec"><div class="tlhead">🕘 휴게·출무${isStb?' (비번날 아침)':''}</div>${sel}${body}</div>`).replace(/익일 /g,'');
}
