<style>
  :root{
    --bg:#f5f4f1; --card:#fff; --ink:#1d1d1f; --muted:#8c8881; --faint:#b8b3aa; --line:#ecebe6;
    --accent:#e8623d; --accent-s:#fbe9e3;
    --day:#c2542f; --day-bg:#fcebe2;
    --night:#3f5180; --night-bg:#e8ecf4;
    --stby:#6f5e94; --stby-bg:#efeaf6;
    --off:#5a8763; --off-bg:#e8efe8;
    --mono:"SF Mono",ui-monospace,"Menlo","Roboto Mono",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR","Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.5;
    max-width:480px;margin:0 auto;padding-bottom:calc(env(safe-area-inset-bottom) + 30px);
    -webkit-font-smoothing:antialiased;letter-spacing:-.01em}
  /* header */
  header{padding:calc(env(safe-area-inset-top) + 26px) 24px 18px;display:flex;align-items:flex-end;gap:12px}
  header .month{font-size:24px;font-weight:800;letter-spacing:-.03em}
  header .month span{color:var(--faint);font-weight:700}
  header .sub{font-size:13px;color:var(--muted);font-weight:500;margin-bottom:5px;flex:1}
  header .taxitot{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:4px;white-space:nowrap}
  header .taxitot b{color:var(--ink);font-family:var(--mono);font-weight:700}
  header .hdrexp{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:1px}
  header .taxitot.gtl{margin-bottom:0}
  header .hdrexp .taxitot{margin-bottom:0}
  header .taxitot.gtl b{color:var(--accent)}
  /* legend */
  .legend{display:flex;gap:14px;padding:0 24px 12px;font-size:12px;color:var(--muted);font-weight:500}
  .legend i{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:0px}

  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}

  .cell.sel{border-color:var(--ink);opacity:1}

  /* detail */
  .detail{padding:14px 20px 0;animation:fade .25s ease}

  .best{font-size:10px;font-weight:800;color:var(--accent);background:var(--accent-s);border-radius:6px;padding:1px 6px;margin-left:2px}
  .nextline{font-size:12.5px;color:var(--muted);margin-top:6px}

  .self b{color:var(--accent);font-weight:700}
  .rest{text-align:center;padding:26px 0 14px}

  details.fold{margin-top:10px;border-top:1px solid var(--line);padding-top:4px}

/* ── PWA 안전 파일 공유 (홈화면 앱은 다운로드 차단 → iOS 공유시트 사용) ── */
function bkMsg(t,ok){let el=document.getElementById('bkmsg');
  if(!el){el=document.createElement('div');el.id='bkmsg';
    el.style.cssText='font-size:11.5px;font-weight:700;margin:6px 24px;text-align:center;min-height:14px';
    const bk=document.querySelector('.backup');if(bk)bk.after(el);else document.body.appendChild(el);}
  el.style.color=ok===false?'#b25151':'#3c6b4a';el.textContent=t||'';
  if(t)setTimeout(()=>{if(el.textContent===t)el.textContent='';},6000);}
async function shareFile(blob,name,type){
  try{
    const file=new File([blob],name,{type});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file]});
      bkMsg('공유창에서 "파일에 저장" 또는 캘린더 추가를 선택하면 돼 ✓');return true;}
  }catch(e){if(e&&e.name==='AbortError')return true;}
  try{
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},800);
    bkMsg('다운로드 시작 — 파일 앱 다운로드 폴더 확인 ✓');return true;
  }catch(e){bkMsg('이 화면에선 저장이 막혀 있어 — 사파리로 접속해서 눌러줘',false);return false;}}
/* ── 📆 캘린더(.ics) 내보내기: 이번 달 근무 → 아이폰 캘린더 → 잠금화면 위젯 ── */
function icsPad(n){return String(n).padStart(2,'0');}
function icsDT(y,m,d,minAbs){ // minAbs가 1440 넘으면 익일로
  let dd=d+Math.floor(minAbs/1440),mm2=m,yy=y;
  const dim=new Date(y,m,0).getDate();
  if(dd>dim){dd-=dim;mm2++;if(mm2>12){mm2=1;yy++;}}
  const t=((minAbs%1440)+1440)%1440;
  return `${yy}${icsPad(mm2)}${icsPad(dd)}T${icsPad(Math.floor(t/60))}${icsPad(t%60)}00`;}
function icsEsc(x){return String(x).replace(/,/g,'\\,').replace(/;/g,'\\;');}
function icsBuild(){
  const y=yr(),mo=dispM(curMonth);
  let out=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//chaeun-sched//KR','CALSCALE:GREGORIAN'];
  let cnt=0;
  const push=(d,st,en,title,descArr)=>{cnt++;
    out.push('BEGIN:VEVENT',`UID:cs-${y}${icsPad(mo)}${icsPad(d)}-${cnt}@chaeun`,
      `DTSTART;TZID=Asia/Seoul:${icsDT(y,mo,d,st)}`,`DTEND;TZID=Asia/Seoul:${icsDT(y,mo,d,en)}`,
      `SUMMARY:${icsEsc(title)}`,
      descArr&&descArr.length?`DESCRIPTION:${icsEsc(descArr.join('\\n'))}`:'','END:VEVENT');};
  const fmtE=e=>`${tlFmt(e.t)} ${e.tag}${e.place?' · '+e.place:''}${e.note?' ('+String(e.note).replace(/<[^>]*>/g,'')+')':''}`;
  const fmtB=e=>String(e.text||'').replace(/<[^>]*>/g,'');
  SCHED.forEach(s=>{
    const ap=getAppt(s.d);
    if(ap){const M=APT_META[ap.t]||APT_META.etc;const aS=toMin(ap.s),aE=ap.e?toMin(ap.e):aS+60;
      push(s.d,aS,aE,`${M[0]} ${M[1]}${ap.e?'':' (끝 미정)'}`,[apptAvail(s.d,ap).why]);}
    if(getSoj().includes(s.d)){const sa=sojAvail(s.d);
      if(sa.ok)push(s.d,540,660,'📚 소집교육 (09:00~11:00)',[sa.why]);}
    if(s.type==='edu'){push(s.d,540,1080,'🏢 일근 (09:00~18:00)',null);return;}
    if(s.type!=='day'&&s.type!=='night')return;
    const D=DIA[s.dia]||{};const cm=s.cm||D.cm;if(!cm)return;
    const nm=s.dia.replace(/^03/,'').replace(/^0+/,'')||s.dia;
    const dl=delGet(s);
    const evB=buildTL(s.dia,(dl&&dl.min>0)?dl:null);
    if(!evB){push(s.d,toMin(cm),toMin(s.tg||D.tg)+(D.ov?1440:0),`🚆 ${nm}다이아 승무`,null);return;}
    const sp=tlSplit(evB);
    let lines=tlCommuteEv(s,D).concat(sp.day0);
    if(D.ov)lines=lines.concat(sp.day1);
    const endEv=lines.filter(e=>e.k==='e'&&e.tag==='종료').pop();
    let en=endEv?endEv.t:toMin(s.tg||D.tg)+(D.ov?1440:0);
    if(endEv){const s2=D.ov?{d:s.d,dow:(s.dow+1)%7,type:s.type}:s;
      const back=tlBackInfo(s2,endEv.t);
      if(back.taxi){lines=lines.concat([{k:'e',t:endEv.t,tag:'택시 퇴근',place:'마산→집 30분'},{k:'e',t:back.homeAbs,tag:'귀가',place:'집'}]);en=back.homeAbs;}
      else{lines=lines.concat([{k:'e',t:back.depAbs,tag:back.confirmed?'퇴근':'퇴근(예상)',place:`마산→창원중앙 ${gf(back.pick.g)}${back.pick.no?' '+back.pick.no:''}`},{k:'e',t:back.homeAbs,tag:'귀가',place:'집 (도착+16분)'}]);en=back.homeAbs;}}
    const prepEv=lines.find(e=>e.k==='e');
    const st=prepEv?prepEv.t:toMin(cm);
    const plat=lines.find(e=>e.k==='e'&&e.tag==='승강홈');
    const desc=lines.map(e=>e.k==='e'?fmtE(e):fmtB(e));
    if(dl&&dl.min>0)desc.unshift(`🚨 지연 +${dl.min}분 반영됨`);
    push(s.d,st,en,`🚆 ${nm}다이아 (준비 ${tlFmt(st)} · 승강홈 ${plat?tlFmt(plat.t):'-'})`,desc);
  });
  out.push('END:VCALENDAR');
  return {txt:out.filter(Boolean).join('\r\n'),cnt};}
function icsExport(){
  const {txt,cnt}=icsBuild();
  if(!cnt){bkMsg('이 달엔 내보낼 근무 일정이 없어',false);return;}
  const blob=new Blob([txt],{type:'text/calendar'});
  shareFile(blob,`근무_${yr()}-${icsPad(dispM(curMonth))}.ics`,'text/calendar');}
function exportData(){const data={_app:'chaeun-schedule',_ver:2,_date:new Date().toISOString()};
  // 앱의 모든 저장 키 백업 (택시·식비·연차·직접입력월·소집교육·밥약속·지연·퇴근선택·시간표편집 등)
  const PRE=['taxi-','food-','leave-','usched-','soj-','appt-','delay-','gopick-'];
  const ONE=['cyclestart','ttov','tlview'];
  try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);
    if(ONE.includes(k)||PRE.some(p2=>k.startsWith(p2))){const v=localStorage.getItem(k);if(v!=null&&v!=='')data[k]=v;}}}
  catch(e){ONE.forEach(k=>{const v=store.get(k);if(v!=null)data[k]=v;});}
  const dt=new Date(),p=n=>String(n).padStart(2,'0');
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  shareFile(blob,`채은_승무앱_백업_${dt.getFullYear()}-${p(dt.getMonth()+1)}-${p(dt.getDate())}.json`,'application/json');}

  }catch(e){bkMsg('파일을 읽지 못했어',false);input.value='';}};

function applyImport(){const o=window._pendingImport;if(!o)return;window._pendingImport=null;
  let n=0;Object.keys(o).forEach(k=>{if(k[0]==='_')return;store.set(k,o[k]);n++;});

  document.getElementById('taxiTotal').textContent='₩'+won(taxiTotal());
  const ft=document.getElementById('foodTotal');if(ft)ft.textContent='₩'+won(foodTotal());
  document.querySelectorAll('.cell').forEach(c=>{const d=+c.dataset.d;
    let t=c.querySelector('.tx');const has=getTaxi(d).length>0;
    if(has){if(!t){t=document.createElement('span');t.className='tx';t.textContent='🚕';c.appendChild(t);}}else if(t)t.remove();

    const s=SCHED.find(x=>x.d===d);const lv=(s&&s.lv)||getLeave(d);c.classList.toggle('lvcell',!!lv);c.classList.toggle('sojcell',getSoj().includes(d));const _ap=getAppt(d);c.classList.toggle('aptcell',!!_ap);if(_ap)c.dataset.apt=(APT_META[_ap.t]||APT_META.etc)[0];
    let lb=c.querySelector('.lvm');
    if(lv){if(!lb){lb=document.createElement('span');c.appendChild(lb);}lb.className='lvm '+(lv==='연차'?'ann':'sick');lb.textContent=lv==='연차'?'연':'병';}else if(lb)lb.remove();});}

/* calendar */
function buildCal(){const grid=document.getElementById('grid');grid.innerHTML='';
  const now=new Date(),isRM=(now.getFullYear()===2026&&now.getMonth()+1===dispM(curMonth)&&yr()===2026),td=now.getDate(),pastM=(yr()<now.getFullYear())||(yr()===now.getFullYear()&&dispM(curMonth)<now.getMonth()+1);
  for(let i=0;i<SCHED[0].dow;i++){const e=document.createElement('div');e.className='cell empty';grid.appendChild(e);}
  SCHED.forEach(s=>{const c=document.createElement('div');c.className='cell '+s.type;c.dataset.d=s.d;c.tabIndex=0;c.setAttribute('role','button');
    if(isRM){if(s.d<td)c.classList.add('past');if(s.d===td)c.classList.add('today');}else if(pastM)c.classList.add('past');
    const cc=s.type==='off'?'·':s.type==='pre'?'':s.type==='standby'?'비번':s.type==='edu'?'일근':s.type==='unknown'?'?':s.dia;
    c.innerHTML=`<span class="n">${s.d}</span><span class="c">${cc}</span>`;
    if(s.lv){c.classList.add('lvcell');const lb=document.createElement('span');lb.className='lvm '+(s.lv==='연차'?'ann':'sick');lb.textContent=s.lv==='연차'?'연':'병';c.appendChild(lb);}
    c.onclick=()=>{curDay=s.d;render();};c.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();curDay=s.d;render();}};
    grid.appendChild(c);});}
function updateHdr(){const hm=document.getElementById('hdrMonth');if(hm)hm.innerHTML=`${dispM(curMonth)}월 <span>${yr()}</span>`;
  const uh=document.getElementById('uhint');if(uh){uh.style.display=isUM()?'flex':'none';const cb=document.getElementById('uClrBtn');if(cb)cb.textContent='🗑 전체 지우기';}

  if(pv)pv.disabled=(i<=0);if(nx)nx.disabled=(i>=MSEQ.length-1);
  const p=document.getElementById('perf');if(p){const q=monthPerf();let t=`📊 <b>${dispM(curMonth)}월 실적</b> · 승무 ${q.days}일`;
    if(q.mins>0)t+=` · 총 ${fmtHM(q.mins)}`;if(q.km>0)t+=` · ${q.km.toFixed(1)}km`;if(q.miss>0)t+=` <span class="pmz">(일부 자료없음)</span>`;
    if(q.edu>0)t+=` · 일근 ${q.edu}일`;

    p.innerHTML=t;}}
/* ===== 직접 입력월 (8~10월 2026) ===== */
const USERM=[8,9,10,111,112];
const UMETA={8:{dim:31,fd:6},9:{dim:30,fd:2},10:{dim:31,fd:4},111:{dim:30,fd:0},112:{dim:31,fd:2}};
const isUM=()=>USERM.includes(curMonth);
const NIGHTD=['03006','03007','03008','03011'];
const uKey=m=>'usched-2026-'+String(m).padStart(2,'0');
function uGet(m){try{const v=store.get(uKey(m||curMonth));if(v)return JSON.parse(v);}catch(e){}return{};}
function uSave(m,map){store.set(uKey(m||curMonth),JSON.stringify(map));}
function buildUserMonth(m){
  const meta=UMETA[m];const map=uGet(m);const out=[];
  for(let d=1;d<=meta.dim;d++){
    const dow=(meta.fd+d-1)%7;const v=map[d];
    if(!v){const pos=((LOFF[m]+d-1)%6)+1; // 7/1 기준 6일주기 (주/야/비/주/휴/휴)
      if(pos===5||pos===6)out.push({d,dow,type:'off',auto:true});
      else out.push({d,dow,type:'pre'});
      continue;}
    else if(v==='off')out.push({d,dow,type:'off'});
    else if(v==='standby')out.push({d,dow,type:'standby'});
    else if(v==='edu')out.push({d,dow,type:'edu',mk:'일근'});
    else if(DIA[v])out.push({d,dow,type:NIGHTD.includes(v)?'night':'day',dia:v,cm:DIA[v].cm,tg:DIA[v].tg});
    else out.push({d,dow,type:'unknown',mk:v});}
  return out;}
function uRefresh(){SCHED=buildUserMonth(curMonth);buildCal();updateHdr();refreshMarks();render();}
let uCyc=null,uClrArm=null;
function uSet(d,v){const map=uGet();
  if(uCyc&&v&&DIA[v]){ // 사이클 진행
    const need=[false,true,false][uCyc.step];
    if(NIGHTD.includes(v)!==need){const n=document.getElementById('uedNote');if(n)n.innerHTML=`<div class="cycstep">⚠️ ${need?'야간(🌙)':'주간'} 다이아를 골라줘!</div>`;return;}
    uCyc.picks.push(v);uCyc.step++;
    if(uCyc.step<3){uShowCyc();return;}
    const s0=uCyc.start,[a,b,c]=uCyc.picks;
    map[s0]=a;map[s0+1]=b;map[s0+2]='standby';map[s0+3]=c;map[s0+4]='off';map[s0+5]='off';
    const done=s0;uCyc=null;uSave(null,map);curDay=done;uRefresh();
    const n=document.getElementById('uedNote');if(n)n.innerHTML=`<div class="cycstep">✅ ${dispM(curMonth)}/${s0}~${dispM(curMonth)}/${s0+5} 사이클 완성 (주/야/비/주/휴/휴)</div>`;
    return;}
  uCyc=null;
  if(v===null)delete map[d];else map[d]=v;
  if(v&&NIGHTD.includes(v)&&d<UMETA[curMonth].dim)map[d+1]='standby';
  uSave(null,map);uRefresh();
  if(v&&NIGHTD.includes(v)&&d<UMETA[curMonth].dim){const n=document.getElementById('uedNote');if(n)n.innerHTML=`<div class="cycstep">🌙 야간이라 ${dispM(curMonth)}/${d+1}은 비번 자동 설정</div>`;}}

  uCyc={start:curDay,step:0,picks:[]};uShowCyc();}
function uShowCyc(){const lbl=['1일차 주간 다이아를 골라줘','2일차 야간 다이아(🌙)를 골라줘','4일차 주간 다이아를 골라줘'][uCyc.step];

const pill=(g,no)=>`<span class="tn ${gc(g)}">${gf(g)}${no?' '+no:''}</span>`;
const WE=dow=>dow===0||dow===5||dow===6;

function meetList(s){const dia=s.dia;let list=MEET[dia]||[];
  if(DIA[dia]&&DIA[dia].ov) list=s.type==='standby'?list.filter(m=>toMin(m.from)<780):list.filter(m=>toMin(m.from)>=780);

function masanEvents(s){const dia=DIA[s.dia],rd=(dia&&dia.ref)||s.dia,segs=RUN[rd]||[];
  let legs=segs;
  if(dia&&dia.ov) legs=s.type==='standby'?segs.filter(g=>+(g.s[0].d||g.s[0].a).split(':')[0]<13):segs.filter(g=>+(g.s[0].d||g.s[0].a).split(':')[0]>=13);
  const ev=[];
  legs.forEach(g=>{const st=g.s;st.forEach((o,idx)=>{if(o.st==='마산'){
    if(idx===0)ev.push({k:'dep',t:toMin((o.d||o.a).slice(0,5))});

// 내가 실제로 마산에 있는 구간 (출근 도착~첫출발 / 다리 사이 마산 대기 / 막도착~종료)
function masanPresence(s){const dia=DIA[s.dia];if(!dia)return[];const D=s.d,B=D*1440,ev=masanEvents(s),out=[];
  const inTime=dia.go?toMin(dia.go.arr):toMin(dia.cm);
  const deps=ev.filter(e=>e.k==='dep').map(e=>e.t), arrs=ev.filter(e=>e.k==='arr').map(e=>e.t);
  const sorted=ev.slice().sort((a,b)=>a.t-b.t), waits=[];
  for(let i=0;i<sorted.length-1;i++) if(sorted[i].k==='arr'&&sorted[i+1].k==='dep'&&sorted[i+1].t-sorted[i].t>5) waits.push([sorted[i].t,sorted[i+1].t]);
  const inEff=Math.max(inTime,toMin(dia.cm)-30); // 사무소엔 보통 출무 직전 도착
  if(s.type==='night'){const fd=deps.length?Math.min(...deps):toMin(dia.cm)+45;out.push({from:B+inEff,to:B+fd,kind:'출근'});
    waits.forEach(w=>out.push({from:B+w[0],to:B+w[1],kind:'휴식'}));}
  else if(s.type==='standby'){waits.forEach(w=>out.push({from:B+w[0],to:B+w[1],kind:'퇴근'}));
    const la=arrs.length?Math.max(...arrs):toMin(dia.arr);out.push({from:B+la,to:B+toMin(dia.tg),kind:'퇴근'});}
  else{const fd=deps.length?Math.min(...deps):toMin(dia.cm)+30,la=arrs.length?Math.max(...arrs):toMin(dia.tg)-30;
    out.push({from:B+inEff,to:B+fd,kind:'출근'});
    waits.forEach(w=>out.push({from:B+w[0],to:B+w[1],kind:'휴식'}));
    out.push({from:B+la,to:B+toMin(dia.tg),kind:'퇴근'});}
  return out;}
function masanLeads(s){const D=s.d,pres=masanPresence(s);if(!pres.length)return[];const map={};
  for(const x of [D-1,D,D+1]){
    const shifts=[[dayLead(x),'주간',x*1440+540,x*1440+1120,'09:00~18:40'],
                  [nightLead(x),'야간',x*1440+1090,(x+1)*1440+550,x<D?'전날 18:10~09:10':'18:10~익일 09:10']];
    for(const sh of shifts){const[code,shift,ls,le,range]=sh;
      for(const p of pres){if(Math.max(p.from,ls)<Math.min(p.to,le)){const k=code+shift+ls;
        if(!map[k])map[k]={code,shift,range,ord:ls,when:new Set()};map[k].when.add(p.kind);}}}
  }
  const res=Object.values(map).sort((a,b)=>a.ord-b.ord);
  res.forEach(l=>{const w=l.when;l.wl=(w.has('출근')&&w.has('퇴근'))?'출근·퇴근':w.has('출근')?'출근':w.has('퇴근')?'퇴근':'근무중';
    l.wc=(w.has('출근')&&w.has('퇴근'))?'both':w.has('출근')?'on':w.has('퇴근')?'off':'mid';});
  return res;}

function computeGo(cm,dow){
  const list=WE(dow)?GO_WE:GO_WD, cmM=toMin(cm), lim=cmM-10; let best=null;
  for(const t of list){ if(t[2]==='기타')continue; const dp=toMin(t[0]),arr=toMin(t[1]); if(dp==null||arr==null||dp>arr)continue; if(arr<=lim&&(!best||arr>toMin(best[1])))best=t; }
  if(best&&cmM-toMin(best[1])>120)return null;
  return best;
}

function backBlock(dia,dow){

  if(!list.length) return `<div class="block"><div class="h">🚉 퇴근</div><div class="self"><span>🚗</span><div><b>막차 끊김</b> · 자차/택시</div></div></div>`;

/* 상세 운행표 (출근·퇴근 사이) + 교대 per 열차 */
function swapLine(rdia,train){const sw=(SWAP[rdia]||[]).filter(e=>e.t===train);
  if(!sw.length)return'';
  return sw.map(e=> e.dir==='in'

function consistSummary(segs){const ch=segs.map(s=>CHAIN[s.t]).filter(Boolean),uniq=[...new Set(ch)];
  const rows=segs.map(s=>`${pill('무',s.t.replace('H',''))} ${CHAIN[s.t]?`<span class="chip" style="background:${CHAIN_COL[CHAIN[s.t]]}">${CHAIN[s.t]}</span>`:''}`).join(' <span style="color:var(--faint)">→</span> ');
  const sum=uniq.length<=1?`🚋 <span class="sum">같은 조성 유지</span> (${uniq[0]||'-'}·${segs[0].ry||'?'}량)`:`🔀 <span class="sum">조성 ${uniq.length}종</span> — 색 바뀌면 다른 차량`;
  return `<div class="consist">${sum}<div class="row">${rows}</div></div>`;

function legHtml(rd,seg,dow){
  const ry=seg.ry||"", c=CHAIN[seg.t];
  const nosec=t=>t?t.split(':').slice(0,2).join(':'):t;
  const DOWc=['일','월','화','수','목','금','토'][dow];
  const R=(v,on)=>on?`<span class="rd">${v}</span>`:v;
  function cells(o){
    let trk=o.trk||'·', dr=o.dr||'·', p=o.p||'·', red=false, pRed=false;
    const m=(o.p||'').match(/^(.+?)\s*\(([가-힣,]+)\)$/);
    if(m){
      const nm=m[1].trim(), days=m[2].split(','), dodge=days.includes(DOWc);
      const tk=(o.trk||'').split(/[\s\n]+/).filter(Boolean);
      const dd=(o.dr||'').split('/'); let nonDr=dd[0]||'', dodgeDr=dd[1]||'';
      if(dodgeDr&&!/^\d/.test(dodgeDr)){const lead=(nonDr.match(/^\d+/)||[''])[0];dodgeDr=lead+dodgeDr;}
      red=true;
      if(dodge){trk=tk[1]||tk[0];dr=dodgeDr||nonDr;p=nm;pRed=true;}
      else{trk=tk[0]||trk;dr=nonDr||dr;p='·';}

    <div class="lh"><span class="g">#${seg.t}</span> · ${seg.s[0].st}→${seg.s[seg.s.length-1].st} ${c?`<span class="chip" style="background:${CHAIN_COL[c]}">조성 ${c}</span>`:''}${ry?`<span class="ry">${ry}량</span>`:''}</div>
    <div class="rawtbl"><table><thead><tr><th>정차역</th><th>선</th><th>문</th><th>대피</th><th>도착</th><th>출발</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

    const an=lg.hwan?`${lg.t}·회송(종착순회 없음)·6:30경(정시 ${T_HW[lg.t].sa})`:(lg._isTerm?`${lg.t}·종착역`:`${lg.t}·교대 넘김`);
    add(arr,'종착',`${lg.alight} 도착`,an,lateHere?{late:dl.min,orig:arrOrig}:null);
  }
  const lastLeg=L[L.length-1];
  if(lastLeg._isTerm)add(lastLeg._arr+15,'종착순회',lastLeg.alight,'도착 +15분(종착역)',lastLeg._late?{late:lastLeg._late,orig:lastLeg._arr-lastLeg._late+15}:null);
  const endBase=abs(toMin(D.tg)),endLate=lastLeg._late||0;
  add(endBase+endLate,'종료','마산 사업소','근무 종료',endLate?{late:endLate,orig:endBase}:null);
  return ev;
}
function tlSplit(ev){let idx=ev.length;for(let i=0;i<ev.length;i++){if(ev[i].k==='e'&&ev[i].t>=1440){idx=i;break;}}return {day0:ev.slice(0,idx),day1:ev.slice(idx)};}
const TL_C={출무:'c-chu',재출무:'c-chu',음주측정:'c-alc',기상:'c-wak',승강홈:'c-pla',출발:'c-run',종착:'c-arr',종착순회:'c-ins',숙소도착:'c-lod',숙소출발:'c-lod',종료:'c-end'};
const TL_HL=['기상','재출무','승강홈'];
function tlRows(evs){return evs.map(e=>{
  if(e.k==='b'){const c=e.tag==='외박'?'stay':(e.tag==='총휴게'?'sum':(e.tag==='회차'?'turn':'rest'));return `<div class="tlblk ${c}">${e.text}</div>`;}
  const hl=TL_HL.includes(e.tag)?' hl':'';
  return `<div class="tlrow ${TL_C[e.tag]||''}${hl}"><span class="tltm">${tlFmt(e.t)}</span><span class="tlbd"><b class="tltg">${e.tag}</b><span class="tlpl">${e.place}</span>${e.note?`<span class="tlnt">${e.note}</span>`:''}</span></div>`;
}).join('');}
/* 카드용: 핵심 시각 칩 + 상세 타임라인 fold */
const TL_RGB={run:'#3f5180',rest:'#5a8763',chk:'#c2542f',sleep:'#6f5e94',move:'#c9a227',apt:'#8c8881',soj:'#c9902f'};
const TL_EMO={run:'🚆',rest:'☕',chk:'📋',sleep:'🛏️',move:'🚶',apt:'📌',soj:'📚'};
const tlDur2=m=>{const h=Math.floor(m/60),mm=m%60;return (h?h+'시간 ':'')+(mm?mm+'분':(h?'':'0분'));};
function tlSegsFrom(ev){
  const out=[];
  for(let i=0;i<ev.length;i++){
    if(ev[i].k!=='e')continue;
    let j=i+1;const mids=[];
    while(j<ev.length&&ev[j].k!=='e'){mids.push(ev[j]);j++;}
    if(j>=ev.length)break;
    const a=ev[i],b=ev[j];if(b.t-a.t<=0)continue;
    let type='chk',label=a.tag,place=a.place;
    if(mids.some(x=>x.tag==='외박')){type='sleep';label='외박(수면)';place=b.place;}
    else if(mids.some(x=>/휴게/.test(x.tag))){type='rest';label='휴게';place=b.place;}
    else if(a.tag==='출발'){type='run';label=(a.note||'').split(' ·')[0].replace(' 운행','');place=a.place;}
    else if(/^(준비|집 출발|출근열차|퇴근|택시)/.test(a.tag)){type='move';}
    out.push([a.t,b.t,type,label,place,(a.late||b.late)?1:0,a.dash?1:0]);
  }
  return out;
}
function tlIsToday(){const rn=new Date();return rn.getFullYear()===yr()&&(rn.getMonth()+1)===dispM(curMonth)&&rn.getDate()===curDay;}
function tlNowAdj(isStandby){const rn=new Date();return rn.getHours()*60+rn.getMinutes()+(isStandby?1440:0);}
function setTlView(v){store.set('tlview',v);render();}
function tlBar(segs,nowAdj){
  const a=Math.min(...segs.map(s=>s[0])),b=Math.max(...segs.map(s=>s[1]));const px=m=>((m-a)/(b-a)*100);
  const ordered=segs.filter(s=>s[2]!=='apt'&&s[2]!=='soj').concat(segs.filter(s=>s[2]==='apt'||s[2]==='soj')); // 일정·교육은 위에
  let h=ordered.map(s=>`<div class="tbseg ${s[5]?'lateseg':''}" style="left:${px(s[0])}%;width:${px(s[1])-px(s[0])}%;background:${TL_RGB[s[2]]};${s[6]?'opacity:.45':''}"></div>`).join('');
  let nm='';if(nowAdj!=null&&nowAdj>=a&&nowAdj<=b)nm=`<div class="tbnow" style="left:${px(nowAdj)}%"></div>`;
  return `<div class="tbwrap"><div class="tbbar">${h}</div>${nm}<span class="tbt" style="left:0">${tlFmt(a)}</span><span class="tbt" style="right:0">${tlFmt(b)}</span></div>`;
}
function tlStateHtml(segs,nowAdj,today){
  if(!today||!segs||!segs.length)return '';
  const c=segs.find(s=>nowAdj>=s[0]&&nowAdj<s[1]);
  if(!c)return `<div class="tlstate"><span class="em">🏠</span><span class="bd2"><span class="k2">지금 (${tlFmt(nowAdj%1440)})</span><span class="v2">근무 시간 아님</span>${tlNextWake()}</span></div>`;
  const pr=((nowAdj-c[0])/(c[1]-c[0])*100).toFixed(0),rm=c[1]-nowAdj;
  return `<div class="tlstate"><span class="em">${TL_EMO[c[2]]}</span><span class="bd2"><span class="k2">지금 (${tlFmt(nowAdj%1440)})</span><span class="v2">${c[3]} · ${c[4]}</span><span class="n2">다음 단계까지 ${tlDur2(rm)}</span><span class="mini2"><i style="width:${pr}%"></i></span></span></div>`;
}
function tlViewCard(segs,nowAdj,today){
  if(!today)return `<div class="tlmsg">📍 현재 위치는 오늘 날짜에서만 표시돼요</div>`+tlBar(segs,null);
  return tlStateHtml(segs,nowAdj,today)+tlBar(segs,nowAdj);
}
function tlViewTimeline(ev,nowAdj,today,segs){
  const es=ev.filter(e=>e.k==='e');
  const endOf=t=>{const i=es.findIndex(x=>x.t===t.t&&x.tag===t.tag);return i<es.length-1?es[i+1].t:t.t+1;};
  const top=tlStateHtml(segs,nowAdj,today);
  let h='';
  ev.forEach(e=>{
    if(e.k==='b'){const c=e.tag==='외박'?'stay':(e.tag==='총휴게'?'sum':(e.tag==='회차'?'turn':'rest'));h+=`<div class="tlblk ${c}">${e.text}</div>`;return;}
    const end=endOf(e);
    const st=!today?'':(nowAdj>=end?'past':(nowAdj>=e.t?'cur':''));
    const col=e.soj?TL_RGB.soj:e.apt?TL_RGB.apt:TL_RGB[e.tag==='출발'?'run':(/휴게|외박/.test(e.tag)?'rest':(/^(준비|집 출발|출근열차|퇴근|택시|귀가)/.test(e.tag)?'move':'chk'))]||'#b8b3aa';
    const dd=end-e.t;
    const tmH=e.late?`<span class="strike2">${tlFmt(e.orig)}</span> <span class="late2">${tlFmt(e.t)} (+${e.late})</span>`:`<span class="vtt">${tlFmt(e.t)}</span>`;
    h+=`<div class="vti ${st} ${e.dash?'dash':''}" style="--vc:${col}"><span class="vtr"><span class="vtd"></span><span class="vtl2"></span></span><span class="vtb">${tmH} <b>${e.tag}</b> <span class="vtp">${e.place}</span>${e.note?`<span class="vtn">${e.note}</span>`:''}${st==='cur'?`<span class="vtnow">● 지금 ${tlFmt(nowAdj%1440)} · ${tlDur2(end-nowAdj)} 남음</span>`:(dd>1&&dd<1440?`<span class="vtdur">${tlDur2(dd)}</span>`:'')}</span></div>`;
  });
  return top+`<div class="vtl">${h}</div>`;
}
function tlViewGantt(segs,nowAdj,today){
  const a=Math.min(...segs.map(s2=>s2[0])),b=Math.max(...segs.map(s2=>s2[1]));const px=m=>((m-a)/(b-a)*100);
  const lanes=[['이동',['move']],['점검',['chk']],['운행',['run']],['휴게',['rest','sleep']]];
  if(segs.some(s2=>s2[2]==='apt'||s2[2]==='soj'))lanes.push(['일정',['apt','soj']]);
  let laneH='';
  lanes.forEach(([nm,types])=>{
    let sh='';segs.filter(s=>types.includes(s[2])).forEach(s=>{sh+=`<div class="gseg ${s[5]?'lateseg':''}" style="left:${px(s[0])}%;width:${px(s[1])-px(s[0])}%;background:${TL_RGB[s[2]]};${s[6]?'opacity:.45':''}"></div>`;});
    laneH+=`<div class="glane"><span class="gl">${nm}</span><span class="gb">${sh}</span></div>`;});
  let ticks='';for(let m=Math.ceil(a/120)*120;m<=b;m+=120)ticks+=`<span class="gtick" style="left:${px(m)}%">${tlFmt(m)}</span>`;
  let nm2='';if(today&&nowAdj>=a&&nowAdj<=b)nm2=`<div class="gnow" style="left:calc(34px + (100% - 34px)*${px(nowAdj)/100})"></div>`;
  return tlStateHtml(segs,nowAdj,today)+`<div class="gwrap">${nm2}${laneH}<div class="gaxis">${ticks}</div></div>`;
}
function tlChips(s){
  const dia=s.dia; if(!dia||!buildTL(dia))return '';
  const ev=buildTL(dia); const sp=tlSplit(ev);
  const isStb=s.type==='standby';
  const mine = isStb ? sp.day1 : sp.day0;
  if(!mine.length) return '';
  const pick=t=>mine.filter(e=>e.k==='e'&&e.tag===t);
  const chips=[];
  if(isStb){[['기상'],['출무'],['승강홈']].forEach(([t])=>{const a=pick(t)[0];if(a)chips.push({k:t,v:tlFmt(a.t).replace('익일 ','')});});}
  else{const plat=pick('승강홈')[0]; if(plat)chips.push({k:'승강홈',v:tlFmt(plat.t)});
    pick('재출무').forEach(a=>chips.push({k:'재출무',v:tlFmt(a.t)}));}
  return chips.length?`<div class="tlchip">${chips.map(c=>`<span class="c"><span class="ck">${c.k}</span><span class="cvl">${c.v}</span></span>`).join('')}</div>`:'';
}
/* ── 지연·퇴근선택 저장 + 출퇴근 확장 ── */
let tlDlyOpen=false;
const delKey=s=>{const d=(s.type==='standby'&&s.d>1)?s.d-1:s.d;return 'delay-'+yr()+'-'+mm()+'-'+d;};
const gpKey=s=>'gopick-'+yr()+'-'+mm()+'-'+s.d;
function delGet(s){try{const v=store.get(delKey(s));if(v)return JSON.parse(v);}catch(e){}return null;}
function delSet(s,dl){store.set(delKey(s),(dl&&dl.min>0)?JSON.stringify(dl):'');}
function toggleTlDly(){tlDlyOpen=!tlDlyOpen;render();}
function tlSetDelayLeg(i){const s=SCHED.find(x=>x.d===curDay);const cur=delGet(s)||{i:i,min:0};cur.i=i;delSet(s,{i:cur.i,min:cur.min||5});render();}
function tlBumpDelay(v){const s=SCHED.find(x=>x.d===curDay);const legs=tlLegs(s.dia)||[];
  const cur=delGet(s)||{i:legs.length-1,min:0};
  cur.min=Math.max(0,Math.min(180,(cur.min||0)+v));delSet(s,cur);render();}
function tlPickGo(dep){const s=SCHED.find(x=>x.d===curDay);const cur=store.get(gpKey(s));
  store.set(gpKey(s),cur===dep?'':dep);render();}
function tlCommuteEv(s,D){
  const cm=(s&&s.cm)||D.cm;if(!cm)return[];
  const g=computeGo(cm,s.dow);
  if(!g)return[{k:'e',t:toMin(cm)-110,tag:'준비 시작',place:'집',note:'출무 1시간 50분 전'},
    {k:'e',t:toMin(cm)-55,tag:'집 출발',place:'자차/택시',note:'이 시간대 창원중앙→마산 열차 없음'}];
  const dep=toMin(g[0]);
  return[{k:'e',t:dep-75,tag:'준비 시작',place:'집',note:'열차 1시간 15분 전'},
    {k:'e',t:dep-15,tag:'집 출발',place:'창원중앙역까지 ~15분',note:null},
    {k:'e',t:dep,tag:'출근열차',place:'창원중앙 → 마산',note:`${gf(g[2])}${g[3]?' '+g[3]:''} · ${g[1]} 마산 도착`}];}
function tlBackInfo(s,endAbs){
  const endM=((endAbs%1440)+1440)%1440;
  const cands=backList(s.dow).filter(b=>toMin(b[0])>=endM).slice(0,4)
    .map(b=>({dep:b[0],arr:b[1],g:b[2],no:b[3]}));
  const sel=store.get(gpKey(s))||'';
  let pick=cands.find(c=>c.dep===sel)||null;
  const confirmed=!!pick;
  if(!pick)pick=cands[0]||null;
  if(!pick)return {taxi:true,homeAbs:endAbs+30,cands:[],pick:null,confirmed:false};
  const dayBase=Math.floor(endAbs/1440)*1440;
  return {taxi:false,cands,pick,confirmed,depAbs:dayBase+toMin(pick.dep),arrAbs:dayBase+toMin(pick.arr),homeAbs:dayBase+toMin(pick.arr)+16};}
function tlNextWake(){
  const rn=new Date();if(yr()!==rn.getFullYear()||dispM(curMonth)!==rn.getMonth()+1)return '';
  const nowM=rn.getHours()*60+rn.getMinutes();
  for(let d=rn.getDate();d<=SCHED.length;d++){
    const x=SCHED.find(q=>q.d===d);if(!x||(x.type!=='day'&&x.type!=='night'))continue;
    const D=DIA[x.dia];if(!D)continue;
    const cm=(x.cm)||D.cm;if(!cm)continue;
    const g=computeGo(cm,x.dow);
    const prep=g?toMin(g[0])-75:toMin(cm)-110;
    if(d===rn.getDate()&&nowM>=prep)continue;
    return `<span class="n2">⏰ 다음 근무 ${dispM(curMonth)}/${d} · 준비 시작 ${toHH(prep)}</span>`;}
  return '<span class="n2">이번 달 남은 근무 없음 🌿</span>';}
function tlSection(s){
  const dia=s.dia; if(!dia||!buildTL(dia))return '';
  const ev=buildTL(dia); const sp=tlSplit(ev);
  const isStb=s.type==='standby';
  const mine = isStb ? sp.day1 : sp.day0;
  if(!mine.length) return '';
  // 뷰 선택
  const v=store.get('tlview')||'card';
  // 지연 반영
  const dl=delGet(s);
  const evD=(dl&&dl.min>0)?buildTL(dia,dl):ev;
  const spD=(dl&&dl.min>0)?tlSplit(evD):sp;
  let mineX=(isStb?spD.day1:spD.day0).slice();
  const legsAll=tlLegs(dia)||[];
  // 출근 (근무일 뷰)
  if(!isStb)mineX=tlCommuteEv(s,DIA[dia]).concat(mineX);
  // 퇴근 (종료가 이 뷰에 있을 때)
  const endEv=mineX.filter(e=>e.k==='e'&&e.tag==='종료').pop();
  let back=null;
  if(endEv){back=tlBackInfo(s,endEv.t);
    if(back.taxi){mineX.push({k:'e',t:endEv.t,tag:'택시 퇴근',place:'마산 → 집 · 30분',note:'이 시간대 퇴근 열차 없음'},
      {k:'e',t:back.homeAbs,tag:'귀가',place:'집',note:null});}
    else{mineX.push({k:'e',t:back.depAbs,tag:back.confirmed?'퇴근':'퇴근 (예상)',place:`마산 → 창원중앙 · ${gf(back.pick.g)}${back.pick.no?' '+back.pick.no:''}`,note:`${back.pick.arr} 창원중앙 도착 → 집까지 16분`,dash:!back.confirmed},
      {k:'e',t:back.homeAbs,tag:'귀가',place:'집',note:'창원중앙 도착 +16분',dash:!back.confirmed});}}
  let segs=tlSegsFrom(mineX);
  // 📌 일정 오버레이 (이 날짜의 일정)
  const ap=getAppt(s.d);
  let mineT=mineX;
  const dayOff=isStb?1440:0; // 비번 뷰는 +1일 좌표
  if(ap){const M=APT_META[ap.t]||APT_META.etc;const aS=toMin(ap.s)+dayOff;const aE=(ap.e?toMin(ap.e):toMin(ap.s)+60)+dayOff;
    segs=segs.concat([[aS,aE,'apt',M[1],M[0],0,ap.e?0:1]]);
    mineT=mineT.concat([{k:'e',t:aS,tag:`${M[0]} ${M[1]}`,place:ap.e?`${ap.s}~${ap.e}`:`${ap.s} (끝 미정)`,note:'내 일정',apt:true}]);}
  // 📚 소집교육 (참석 가능한 날만 09~11시 표시)
  if(getSoj().includes(s.d)){const sa=sojAvail(s.d);
    if(sa.ok){segs=segs.concat([[540+dayOff,660+dayOff,'soj','소집교육','📚',0,0]]);
      mineT=mineT.concat([{k:'e',t:540+dayOff,tag:'📚 소집교육',place:'09:00~11:00 · 사업소',note:sa.why,soj:true}]);}}
  if(mineT!==mineX)mineT=mineT.slice().sort((x,y)=>x.t-y.t);
  const today=tlIsToday();
  const nowAdj=tlNowAdj(isStb);
  // 지연 경고
  let warn='';
  if(dl&&dl.min>0&&dl.i<legsAll.length-1){
    const cur=legsAll[dl.i],nxt=legsAll[dl.i+1];
    let arrM=toMin(cur.arr)+dl.min;let depN=toMin(nxt.dep);if(depN<toMin(cur.arr))depN+=1440;
    if(arrM+15>depN-25)warn=`<div class="tlwarn">⚠️ 지연으로 ${nxt.t} 승강홈까지 여유가 없어 — 빠른회차/휴게 축소 주의</div>`;}
  // 지연 칩+패널
  const dmin=(dl&&dl.min)||0;
  const chip=`<button class="tddchip ${dmin?'late':''}" onclick="toggleTlDly()">🚨${dmin?` +${dmin}분`:(tlDlyOpen?' 닫기':'')}</button>`;
  let panel='';
  if(tlDlyOpen){
    const di=(dl&&dl.i!=null)?dl.i:legsAll.length-1;
    panel=`<div class="tddly"><div class="tdh"><span>🚨 어느 열차가 지연됐어?</span><span onclick="toggleTlDly()" style="cursor:pointer;color:var(--faint)">✕ 닫기</span></div>
      <div class="tdlegs">${legsAll.map((l,i)=>`<button class="${i===di?'on':''}" onclick="tlSetDelayLeg(${i})">${l.t}</button>`).join('')}</div>
      <div class="tdrow"><button onclick="tlBumpDelay(-5)">−</button><span class="tdv ${dmin?'':'zero'}">+${dmin}분</span><button onclick="tlBumpDelay(5)">＋</button></div></div>`;}
  // 퇴근 선택 UI
  let goHtml='';
  if(back&&!back.taxi&&back.cands.length){
    goHtml=`<div class="tlgo"><div class="tgl">🚉 퇴근 열차 — ${back.confirmed?'✅ 확정':'미정 · 가장 빠른 편 예상'}</div><div class="tgo">${back.cands.map(c=>`<button class="${back.confirmed&&back.pick.dep===c.dep?'on':''}" onclick="tlPickGo('${c.dep}')">${c.dep} ${gf(c.g)}${c.no?' '+c.no:''}</button>`).join('')}</div></div>`;}
  else if(back&&back.taxi){goHtml=`<div class="tlgo"><div class="tgl">🚕 퇴근 열차 없음 → 택시 30분 · 귀가 ${tlFmt(back.homeAbs).replace('익일 ','')}${back.homeAbs>=1440&&!isStb?' (익일)':''}</div></div>`;}
  let body='';
  if(v==='tline')body=tlViewTimeline(mineT,nowAdj,today,segs)+goHtml;
  else if(v==='gantt')body=(segs.length?tlViewGantt(segs,nowAdj,today):'')+goHtml;
  else body=segs.length?tlViewCard(segs,nowAdj,today):'';
  const sel=`<div class="tlsel">${[['card','📍 현재'],['tline','📋 타임라인'],['gantt','📊 간트']].map(([k,l])=>`<button class="${v===k?'on':''}" onclick="setTlView('${k}')">${l}</button>`).join('')}</div>`;
  return (`<div class="tlsec"><div class="tlhead">🕘 휴게·출무${isStb?' (비번날 아침)':''}<span class="tdchipwrap">${chip}</span></div>${panel}${warn}${sel}${body}`).replace(/익일 /g,'')+`</div>`;
}

buildCal();
updateHdr();
refreshMarks();
